[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/mtg_ai/__init__.py"

[project]
name = "mtg-ai"
description = "Magic the Gathering general information and combo llama-based LLM"
authors = [{name = "Thomas Meyer", email = "thomas@thomasmeyer.co" }]
requires-python = ">=3.11,<3.12"
dynamic = ["version"]

[project.scripts]
mtg-ai = "mtg_ai:_cli_main"

[tool.pixi.project]
channels = [ "nvidia", "pytorch", "xformers", "conda-forge", "anaconda"]
platforms = ["linux-64"]

[tool.pixi.tasks]
lint = "pre-commit run --all-files"
test = "pytest"
docker-build = "docker build --progress=plain -t mtg-ai:latest ."
docker-run = "docker run --gpus all -p 8889:8889 mtg-ai:latest"

[tool.pixi.feature.dev.tasks]
jupyter-lab = "jupyter-lab --ip=0.0.0.0 --port=8889 --no-browser"

[tool.pixi.environments]
default = { solve-group = "default" }
test = { features = ["test"], solve-group = "default" }
dev = { features = ["dev", "test"], solve-group = "default" }

[tool.pixi.dependencies]
pytorch = "2.4.1"
pytorch-cuda = { version="12.1", channel = "pytorch" }
xformers = "*"
haystack-ai = "*"

[tool.pixi.pypi-dependencies]
mtg-ai = { path = ".", editable = true }
unsloth = ">=2024.8"
datasets = ">=2.14.4"
transformers = ">=4.46.3"
accelerate = ">=1.1.1"
peft = ">=0.13.2"
trl = ">=0.11.4"
bitsandbytes = ">=0.44.1"
rapidfuzz = ">=3.10.1"
sentence-transformers = ">=3.3.1"

[tool.pixi.feature.dev.dependencies]
colorlog = ">=6.9.0"
ipykernel = ">=6.29.5"
jupyter = ">=1.1.1"
rpds-py = ">=0.20.1"

[tool.pixi.feature.dev.pypi-dependencies]
ruff  = ">=0.7.4"
jupyterlab = ">=4.2.6"
ipython = ">=8.29.0"
pixi-kernel = ">=0.5.1"
ipywidgets = ">=8.1.5"
tensorboard = ">=2.18.0"
torch-tb-profiler = ">=0.4.3"

[project.optional-dependencies]
test = ["pytest"]
# dev = ["ruff", "jupyterlab", "ipython", "pixi-kernel", "ipywidgets>=8.1.5,<9", "tensorboard>=2.18.0,<3", "torch-tb-profiler>=0.4.3,<0.5"]

# Extra tool configs

[tool.ruff]
line-length = 88
target-version = "py311"
fix = true
exclude = [
    ".git",
    ".hg",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "build",
    "dist",
    "*.ipynb",
]

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
fixable = ["E", "F", "B", "I"]
ignore = ["E501"]

[tool.ruff.format]
docstring-code-format = true
docstring-code-line-length = 20

